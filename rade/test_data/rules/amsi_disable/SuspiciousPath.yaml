id: 99887766-5544-3322-1100-ffeeddccbbaa
name: Suspicious Process Path
description: Detects processes running from suspicious locations
categories: ["execution"]
mitre_tactic: Execution
mitre_tactic_id: TA0002
mitre_id: T1059
example: 'C:\Users\Public\malware.exe'
condition: |
  process_path.contains('\\Temp\\') || process_path.contains('\\Public\\') || process_path.contains('\\AppData\\Local\\Temp\\')
