id: 5e31f5ec-ef18-445b-bddd-846c064ca709
name: Amsi Disable Registry
description: Detects the removal of AMSI via registry modifications.
categories: ["amsi", "bypass", "registry", "powershell"]
mitre_tactic: Defense Evasion
mitre_tactic_id: TA0005
mitre_id: T1070
example: reg delete "HKLM\SOFTWARE\Microsoft\AMSI\Providers" /f
condition: !And
- !Contains
  - !Field Content
  - !Str Microsoft\\AMSI\\Providers
  - CaseInsensitive
- !Or
  - !Contains
    - !Field ContentTokens
    - !Str Remove-Item
    - CaseInsensitive
  - !Contains
    - !Field ContentTokens
    - !Str rm
    - CaseInsensitive
  - !And
    - !Contains
      - !Field ContentTokens
      - !Str reg
      - CaseInsensitive
    - !Contains
      - !Field ContentTokens
      - !Str delete
      - CaseInsensitive